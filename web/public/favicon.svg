<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="url(#cpuGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="100%" height="100%">
  <defs>
    <linearGradient id="cpuGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7e40" />
      <stop offset="50%" stop-color="#ffb834" />
      <stop offset="100%" stop-color="#ffca28" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Background Glow to match premium look -->
  <rect x="5" y="5" width="14" height="14" rx="2" ry="2" stroke="url(#cpuGrad)" stroke-width="0.5" opacity="0.15" fill="url(#cpuGrad)" fill-opacity="0.05" filter="url(#glow)" />
  
  <!-- Outer Processor Case -->
  <rect x="4" y="4" width="16" height="16" rx="2" ry="2" filter="url(#glow)" />
  
  <!-- Inner Die -->
  <rect x="9" y="9" width="6" height="6" fill="url(#cpuGrad)" fill-opacity="0.2" />
  
  <!-- Contact Pins -->
  <line x1="9" y1="1" x2="9" y2="4" />
  <line x1="15" y1="1" x2="15" y2="4" />
  <line x1="9" y1="20" x2="9" y2="23" />
  <line x1="15" y1="20" x2="15" y2="23" />
  <line x1="20" y1="9" x2="23" y2="9" />
  <line x1="20" y1="15" x2="23" y2="15" />
  <line x1="1" y1="9" x2="4" y2="9" />
  <line x1="1" y1="15" x2="4" y2="15" />
</svg>
