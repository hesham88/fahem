name: Deploy Cloud Run Agents

on:
  push:
    branches:
      - main
    paths:
      - 'agents/**'
      - 'scripts/**'

jobs:
  deploy:
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1061555578804/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@fahem-88d40.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: fahem-88d40

      - name: Deploy to Cloud Run
        run: |
          cp -r scripts agents/
          gcloud run deploy fahem-agent \
            --source agents \
            --region us-east4 \
            --vpc-connector fahem-connector \
            --vpc-egress private-ranges-only \
            --memory 2Gi \
            --no-cpu-throttling \
            --min-instances=1 \
            --set-secrets="GEMINI_API_KEY=fahem_gemini_api_key:latest,MONGODB_URI=fahem_mongodb_uri:latest"
          # D-INGEST-TRIGGER: --min-instances=1 (with --no-cpu-throttling) keeps a warm instance so the
          # post-response background ingestion thread isn't killed by scale-to-zero. The durable path
          # (FC8.5, below) dispatches ingestion to a dedicated Cloud Run Job; the warm instance now only
          # covers the local/fallback thread.

      - name: Deploy Ingestion Worker (Cloud Run Job)
        run: |
          # FC8.5: dedicated worker that runs job_fetch.py to completion independently of the API
          # service lifecycle (survives deploys/health restarts/scale events — the root cause of the
          # frozen accounting jobs). Same source image; entrypoint overridden to the ingestion script.
          # A long task-timeout covers large books (~45 min for ~1000 pages); 1 retry recovers a
          # transient infra failure. The payload is supplied per-execution via INGEST_PAYLOAD.
          gcloud run jobs deploy fahem-ingest-worker \
            --source agents \
            --region us-east4 \
            --vpc-connector fahem-connector \
            --vpc-egress private-ranges-only \
            --memory 4Gi \
            --task-timeout 3600 \
            --max-retries 1 \
            --command python \
            --args ingestion_v2/job_fetch.py \
            --set-env-vars="FORCE_MONGO=true" \
            --set-secrets="GEMINI_API_KEY=fahem_gemini_api_key:latest,MONGODB_URI=fahem_mongodb_uri:latest"
          # FORCE_MONGO=true: a Cloud Run Job does not set K_SERVICE, so force MongoDB writes ON
          # (belt-and-suspenders with the CLOUD_RUN_JOB detection in utils.is_mongodb_enabled) — the
          # worker must never fall back to the local-JSON/offline path and silently skip DB persistence.
          # The API service runs as the default compute SA; allow it to trigger job executions.
          gcloud run jobs add-iam-policy-binding fahem-ingest-worker \
            --region us-east4 \
            --member="serviceAccount:1061555578804-compute@developer.gserviceaccount.com" \
            --role="roles/run.invoker"

