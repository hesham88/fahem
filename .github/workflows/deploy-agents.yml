name: Deploy Cloud Run Agents

on:
  push:
    branches:
      - main
    paths:
      - 'agents/**'
      - 'scripts/**'

jobs:
  deploy:
    name: Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/1061555578804/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
          service_account: 'github-deployer@fahem-88d40.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: fahem-88d40

      - name: Deploy to Cloud Run
        run: |
          cp -r scripts agents/
          gcloud run deploy fahem-agent \
            --source agents \
            --region us-east4 \
            --set-secrets="GEMINI_API_KEY=fahem_gemini_api_key:latest,MONGODB_URI=fahem_mongodb_uri:latest"

